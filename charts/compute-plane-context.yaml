global:
  armonik-dependencies:
    conf:
      fullnameOverride: "armonik-conf"

serviceAccount:
  create: false
  name: "compute-plane"

init:
  configmaps:
    - "armonik-conf-core"
    - "armonik-conf-log"
    - "armonik-conf-jobs"
  conf:
    envFromSecret:
      MongoDB__Password:
        secret: "mongodb"
        field: "mongodb-root-password"
      Redis__Password:
        secret: "redis"
        field: "redis-password"
    mountSecret:
      mongodb-cert:
        secret: "mongodb-ca"
        path: "/mongodb/certificate/"
        mode: "0444"

partitionCommon:
