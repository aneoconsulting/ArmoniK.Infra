{{- /* Resolve the conf fullname prefix */}}
{{- $confCtx := include "armonik.conf.context" . | fromYaml -}}
{{- $confFullname := $confCtx.Values.fullnameOverride | default "" -}}
{{- if not $confFullname -}}
  {{- $confName := default "conf" $confCtx.Values.nameOverride -}}
  {{- if contains $confName $confCtx.Release.Name -}}
    {{- $confFullname = $confCtx.Release.Name -}}
  {{- else -}}
    {{- $confFullname = printf "%s-%s" $confCtx.Release.Name $confName | trunc 63 | trimSuffix "-" -}}
  {{- end -}}
{{- end -}}

{{- /* Retrieves minimal/required confs for later control planes and init jobs */}}
{{- $controlConf := include "armonik.conf.controlRaw" . | fromYaml -}}
{{- $jobsConf := include "armonik.conf.jobsRaw" . | fromYaml -}}

{{- /* Determines the service account name to use for later control planes */}}
{{- $controlPlaneServiceAccountName := include "armonik.utils.index" (list .Values "compute-plane" "serviceAccountName" "name") | default "compute-plane" -}}


apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "armonik.fullname" . | printf "%s-control-plane-context" | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "armonik.namespace" . }}
  labels:
    app.kubernetes.io/component: control-plane-context
    {{- include "armonik.labels" . | nindent 4 }}
data:
  control-plane-context.yaml: |
    # Auto-generated by the armonik umbrella chart.
    # Use this file when installing standalone control-planes:
    #
    #   helm install <name> ./charts/armonik-control-plane \
    #     -n {{ .Release.Namespace }} \
    #     -f control-plane-context.yaml \
    #     -f your-control-plane.yaml

    serviceAccount:
      create: false
      name: {{ $controlPlaneServiceAccountName | quote }}

    init:
      configmaps:
        - {{ printf "%s-jobs" $confFullname | quote }}
      conf: {{- $jobsConf | toYaml | nindent 8 }}

    conf: {{- $controlConf | toYaml | nindent 6 }}
