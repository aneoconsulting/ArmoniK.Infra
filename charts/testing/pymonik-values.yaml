
init:
  enabled: true
  image:
    repository: dockerhubaneo
    name: armonik_control
  conf:
    envFromSecret:
      Redis__Password:
        secret: redis
        field: redis-password
      MongoDB__Password:
        secret: mongodb
        field: mongodb-root-password

# Inject the secret refs that the deployment pods need.
# To discover these values from your running cluster:
#   kb get pod -l app.kubernetes.io/component=control-plane -o yaml | grep -B5 secretKeyRef
# conf:
#   envFromSecret:
#     Redis__Password:
#       secret: redis
#       field: redis-password
#     MongoDB__Password:
#       secret: mongodb
#       field: mongodb-root-password
# # env:
# - name: Redis__Password
#   valueFrom:
#     secretKeyRef:
#       name: redis
#       key: redis-password

serviceAccount:
  create: false
  name: compute-plane
# TODO: to test
rbac:
  create: false

# Only define the partition(s) this compute-plane manages
partitions:
