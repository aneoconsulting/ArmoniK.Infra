############################################
################## GLOBAL ##################
############################################
global:
  version:
    armonikCore: "0.37.1" ### TODO FIX VERSIONS GLOBAL IF NULL USE DEFAULT IN SUB CHARTS COMPUTE-PLANE
    #armonikPollingagent: "0.35.0"
    #armonikGui: "0.14.5"
    #nginx: "1.27.4-alpine-slim"
  image:
    pullPolicy: IfNotPresent # FOR KEDA IMAGES
    registry: "" # FOR KEDA IMAGES
  imageRegistry: "" #"public.ecr.aws" # FOR BITNAMI IMAGES AND ARMONIK IMAGES
  security:
    allowInsecureImages: true
  #imagePullSecrets: [{"name": "secret"}] # FOR BITNAMI IMAGES AND ARMONIK IMAGES
  environment:
    name: "local"
    description: "Armonik environment"


############################################
### ARMONIK APPLICATION CONFIGURATION #####
############################################
control-plane:
  enabled: true
  defaultPartition: default
  extraPartitions:
    # default:
    #   podMax: 100
    #   podReserved: 50
    #   preemptionPercentage: 20
    #   priority: 1
  rbac:
    createBuiltInRoles: true

compute-plane:
  enabled: true
  # partitions:
  #   default:
  #     worker:
  #       image:
  #         name: "armonik-dynamic-dotnet-worker"
  #         tag: "0.21.3-ppi.taskFail.1.geb3e9a8"
  #   stream:
  #     worker:
  #       image:
  #         name: "armonik_core_stream_test_worker"
  #   htcmock:
  #     socketType: "tcp"
  #     worker:
  #       image:
  #         name: "armonik_core_htcmock_test_worker"

conf:
  log:
    minimumLevel: Information

################## INGRESS ##################
ingress:
  enabled: true

############################################
############### DEPENDENCIES ###############
############################################

dependencies:
  ################# RABBITMQ #################
  rabbitmq:
    image:
      registry: public.ecr.aws
    enabled: false
    fullnameOverride: "rabbitmq"
    auth:
      username: "admin"
      password: "admin"
      # tls:
      #   enabled: false
      #   autoGenerated: false
    #esourcesPreset: nano
    persistence:
      enabled: false
    metrics:
      image: 
        registry: public.ecr.aws
      enabled: true
      serviceMonitor:
        enabled: true

  ################## REDIS ##################
  redis:
    image:
      registry: public.ecr.aws

    enabled: true
    useStatefulSet: true
    replica:
      replicaCount: 1
      persistence:
        enabled: false
      autoscaling:
        enabled: false
        targetCPU: "80"
        targetMemory: "80"
    fullnameOverride: "redis"
    tls: #BUG CHART https://github.com/bitnami/charts/issues/29616
      enabled: false
      autoGenerated: false
      authClients: false
      # existingSecret: redis-crt
      # certFilename: "tls-combined.pem"
      # certKeyFilename: "tls.key"
      # certCAFilename: "ca.crt"
    usernames:
      admin: admin
    master:
      resourcesPreset: nano
      persistence:
        enabled: false
      containerPorts:
        redis: 6379
    metrics:
      image: 
          registry: public.ecr.aws
      enabled: true
      serviceMonitor:
        enabled: true

  ################## ACTIVEMQ ##################
  activemq:
    enabled: true
    replicas: 1
    fullnameOverride: "activemq"
    image:
      registry: docker.io

  ################## MONGODB ##################
  mongodb:
    image:
        registry: public.ecr.aws
    enabled: true
    replicas: 2
    metrics:
      image: 
        registry: public.ecr.aws
      enabled: true
      serviceMonitor:
        enabled: true
    architecture: "replicaset"
    fullnameOverride: "mongodb"
    useStatefulSet: true
    replicaCount: 1
    persistence:
      enabled: false
    extraFlags: --tlsAllowConnectionsWithoutCertificates
    #existingConfigmap: "mongodb-armonik-scripts"
    tls:
      image: 
        registry: public.ecr.aws
      enabled: true
      mode: allowTLS
      autoGenerated: true
      replicaset:
        existingSecret: mongodb-crt

  ################## KEDA ##################
  keda:
    enabled: true
    crds:
      install: true
    prometheus:
      metricServer:
        enabled: true
        serviceMonitor:
          enabled: true
    certificates:
      certManager:
        enabled: false
        issuer:
          {
            "generate": false,
            "group": "cert-manager.io",
            "kind": "ClusterIssuer",
            "name": "armonik-selfsigned-issuer",
          }
    image:
      pullPolicy: IfNotPresent
    #imagePullSecrets: []

  ################## CERT-MANAGER ##################
  cert-manager:
    enabled: true
    installCRDs: true
    fullnameOverride: "cert-manager"
    prometheus:
      servicemonitor:
        enabled: true

  ################## GRAFANA ##################
  grafana:
    image:
        registry: docker.io
    enabled: true
    serviceMonitor:
      enabled: true
    fullnameOverride: "grafana"
    grafana.ini:
      server:
        domain: grafana.local
        root_url: http://grafana
        serve_from_sub_path: true
      anonymous:
        enabled: true
      auth.anonymous:
        enabled: true
    sidecar:
      dashboards:
        enabled: true
        folderAnnotation: "grafana_dashboard_folder"
        label: "grafana_dashboard"
      datasources:
        enabled: true

  ################## FLUENT-BIT ##################
  fluent-bit:
    enabled: true
    fullnameOverride: "fluent-bit"
    daemonSetVolumes:
      - name: runlogjournal
        hostPath:
          path: /run/log/journal
          type: ''
      - name: dmesg
        hostPath:
          path: /var/log/dmesg
          type: ''
      - name: varlog
        hostPath:
          path: /var/log
          type: ''
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
          type: ''
    daemonSetVolumeMounts:
      - name: runlogjournal
        readOnly: true
        mountPath: /run/log/journal
      - name: dmesg
        readOnly: true
        mountPath: /var/log/dmesg
      - name: varlog
        readOnly: true
        mountPath: /var/log
      - name: varlibdockercontainers
        readOnly: true
        mountPath: /var/lib/docker/containers

    config:
            # Parsers_File  /fluent-bit/etc/parsers.conf
      service: |
        [SERVICE]
            Daemon        Off
            Flush         1
            Log_Level     info
            Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
            HTTP_Server   On
            HTTP_Listen   0.0.0.0
            HTTP_Port     2020
            Health_Check  On
      inputs: |
        [INPUT]
            Name               tail
            Tag                kube.*
            Path               /var/log/containers/*control-plane*.log, /var/log/containers/*compute-plane*.log
            Parser             cri
            Docker_Mode        On
            Buffer_Chunk_Size  512KB
            Buffer_Max_Size    5M
            Rotate_Wait        30
            Mem_Buf_Limit      30MB
            Skip_Long_Lines    Off
            Refresh_Interval   10
            Read_from_Head     On
        [INPUT]
            Name               tail
            Tag                application.*
            Path               /var/log/containers/*control-plane*.log, /var/log/containers/*compute-plane*.log, /var/log/containers/*ingress*.log, /var/log/containers/mongodb*.log, /var/log/containers/keda*.log
            Parser             cri
            Buffer_Chunk_Size  512KB
            Buffer_Max_Size    5M
            Rotate_Wait        30
            Mem_Buf_Limit      30MB
            Skip_Long_Lines    Off
            Refresh_Interval   10
            Read_from_Head     On
      filters: |
        [FILTER]
            Name                kubernetes
            Match               *
            Kube_URL            https://kubernetes.default.svc:443
            Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
            Kube_Tag_Prefix     kube.var.log.containers.
            Merge_Log           On
            Merge_Log_Trim      On
            Merge_Parser        json
            Keep_Log            Off
            Annotations         On
            Labels              On
            K8S-Logging.Parser  On
            K8S-Logging.Exclude Off
            Buffer_Size         0
        [FILTER]
            Name                    nest
            Match                   *
            Operation               lift
            Nested_under            kubernetes
            Add_prefix              kubernetes_
        [FILTER]
            Name                    modify
            Match                   *
            Condition               Key_exists log
            Rename                  log @m
            Add                     sourcetype renamelog
      outputs: |
        [OUTPUT]
            Name                    http
            Match                   kube.*
            Host                    seq
            Port                    5341
            URI                     /api/events/raw?clef
            Header                  Content-Type application/vnd.serilog.clef
            Format                  json_lines
            json_date_key           @t
            json_date_format        iso8601
        [OUTPUT]
            Name                    stdout
            Match                   kube.*
      customParsers: |
        [PARSER]
            Name   json
            Format json
            Time_Key time
            Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        [PARSER]
            Name cri
            Format regex
            Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
            Time_Key time
            Time_Format %Y-%m-%dT%H:%M:%S.%L%z
            Time_Keep On

    # Regex ^(?:(?<time>[^\s]+)\s+(?<stream>\w+)\s+(?<logtag>\w+)\s+)?(?<log>\{.*\})$
