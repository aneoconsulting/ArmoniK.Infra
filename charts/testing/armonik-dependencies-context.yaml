        extraFiles: {}
        filters: "[FILTER]\n    Name                kubernetes\n    Match        \
          \       *\n    Kube_URL            https://kubernetes.default.svc:443\n\
          \    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt\n\
          \    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token\n\
          \    Kube_Tag_Prefix     kube.var.log.containers.\n    Merge_Log       \
          \    On\n    Merge_Log_Trim      On\n    Merge_Parser        json\n    Keep_Log\
          \            Off\n    Annotations         On\n    Labels              On\n\
          \    K8S-Logging.Parser  On\n    K8S-Logging.Exclude Off\n    Buffer_Size\
          \         0\n[FILTER]\n    Name                    nest\n    Match     \
          \              *\n    Operation               lift\n    Nested_under   \
          \         kubernetes\n    Add_prefix              kubernetes_\n[FILTER]\n\
          \    Name                    modify\n    Match                   *\n   \
          \ Condition               Key_exists log\n    Rename                  log\
          \ @m\n    Add                     sourcetype renamelog\n"
        inputs: "[INPUT]\n    Name               tail\n    Tag                kube.*\n\
          \    Path               /var/log/containers/*control-plane*.log, /var/log/containers/*compute-plane*.log\n\
          \    Parser             cri\n    Docker_Mode        On\n    Buffer_Chunk_Size\
          \  512KB\n    Buffer_Max_Size    5M\n    Rotate_Wait        30\n    Mem_Buf_Limit\
          \      30MB\n    Skip_Long_Lines    Off\n    Refresh_Interval   10\n   \
          \ Read_from_Head     On\n[INPUT]\n    Name               tail\n    Tag \
          \               application.*\n    Path               /var/log/containers/*control-plane*.log,\
          \ /var/log/containers/*compute-plane*.log, /var/log/containers/*ingress*.log,\
          \ /var/log/containers/mongodb*.log, /var/log/containers/keda*.log\n    Parser\
          \             cri\n    Buffer_Chunk_Size  512KB\n    Buffer_Max_Size   \
          \ 5M\n    Rotate_Wait        30\n    Mem_Buf_Limit      30MB\n    Skip_Long_Lines\
          \    Off\n    Refresh_Interval   10\n    Read_from_Head     On\n"
        outputs: "[OUTPUT]\n    Name                    http\n    Match          \
          \         kube.*\n    Host                    seq\n    Port            \
          \        5341\n    URI                     /api/events/raw?clef\n    Header\
          \                  Content-Type application/vnd.serilog.clef\n    Format\
          \                  json_lines\n    json_date_key           @t\n    json_date_format\
          \        iso8601\n[OUTPUT]\n    Name                    stdout\n    Match\
          \                   kube.*\n"
        service: "[SERVICE]\n    Daemon        Off\n    Flush         1\n    Log_Level\
