{{- /* Retrieves minimal/required confs for later compute planes and init jobs */}}
{{- $jobsConf := include "armonik.conf.jobsRaw" . | fromYaml -}}
{{- $computeConf := include "armonik.conf.computeRaw" . | fromYaml -}}
{{- $pollingConf := include "armonik.conf.pollingRaw" . | fromYaml -}}
{{- $workerConf := include "armonik.conf.workerRaw" . | fromYaml -}}

{{- /* Determines the service account name to use for later control planes */}}
{{- $computePlaneServiceAccountName := include "armonik.utils.index" (list .Values "compute-plane" "serviceAccountName" "name") | default "compute-plane" -}}


apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "armonik.fullname" . | printf "%s-compute-plane-context" | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "armonik.namespace" . }}
  labels:
    app.kubernetes.io/component: compute-plane-context
    {{- include "armonik.labels" . | nindent 4 }}
data:
  compute-plane-context.yaml: |
    # Auto-generated by the armonik umbrella chart.
    # Use this file when installing standalone compute-planes:
    #
    #   helm install <name> ./charts/armonik-compute-plane \
    #     -n {{ .Release.Namespace }} \
    #     -f compute-plane-context.yaml \
    #     -f <your-partitions>.yaml

    serviceAccount:
      create: false
      name: {{ $computePlaneServiceAccountName | quote }}

    init:
      conf: {{- $jobsConf | toYaml | nindent 8 }}
  
    conf: {{- $computeConf | toYaml | nindent 6 }}
    partitionCommon:
      conf: {{- $jobsConf | toYaml | nindent 8 }}
      agent:
        conf: {{- $pollingConf | toYaml | nindent 10 }}
      worker:
        conf: {{- $workerConf | toYaml | nindent 10 }}
      