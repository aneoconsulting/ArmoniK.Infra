{{- /* Resolve the conf fullname prefix */}}
{{- $confCtx := include "armonik.conf.context" . | fromYaml -}}
{{- $confFullname := $confCtx.Values.fullnameOverride | default "" -}}
{{- if not $confFullname -}}
  {{- $confName := default "conf" $confCtx.Values.nameOverride -}}
  {{- if contains $confName $confCtx.Release.Name -}}
    {{- $confFullname = $confCtx.Release.Name -}}
  {{- else -}}
    {{- $confFullname = printf "%s-%s" $confCtx.Release.Name $confName | trunc 63 | trimSuffix "-" -}}
  {{- end -}}
{{- end -}}

{{- /* Resolve the core conf to get envFromSecret and mountSecret */}}
{{- $coreConf := include "armonik.conf.coreRaw" . | fromYaml -}}

{{- /* Resolve the service account name from the compute-plane subchart */}}
{{- $cpValues := index .Values "compute-plane" | default dict -}}
{{- $cpSA := $cpValues.serviceAccount | default dict -}}
{{- $cpSAName := $cpSA.name | default "compute-plane" -}}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "armonik.fullname" . | printf "%s-compute-plane-context" | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ include "armonik.namespace" . }}
  labels:
    app.kubernetes.io/component: compute-plane-context
    {{- include "armonik.labels" . | nindent 4 }}
data:
  compute-plane-context.yaml: |
    # Auto-generated by the armonik umbrella chart.
    # Use this file when installing standalone compute-planes:
    #
    #   helm install <name> ./charts/armonik-compute-plane \
    #     -n {{ .Release.Namespace }} \
    #     -f compute-plane-context.yaml \
    #     -f <your-partitions>.yaml

    global:
      armonik-dependencies:
        conf:
          fullnameOverride: {{ $confFullname | quote }}

    serviceAccount:
      create: false
      name: {{ $cpSAName | quote }}

    init:
      configmaps:
        - {{ printf "%s-core" $confFullname | quote }}
        - {{ printf "%s-log" $confFullname | quote }}
        - {{ printf "%s-jobs" $confFullname | quote }}
      conf:
    {{- if $coreConf.envFromSecret }}
        envFromSecret:
      {{- range $name, $ref := $coreConf.envFromSecret }}
          {{ $name }}:
            secret: {{ $ref.secret | quote }}
            field: {{ $ref.field | quote }}
      {{- end }}
    {{- end }}
    {{- if $coreConf.mountSecret }}
        mountSecret:
      {{- range $name, $ref := $coreConf.mountSecret }}
          {{ $name }}:
            secret: {{ $ref.secret | quote }}
            path: {{ $ref.path | quote }}
        {{- if $ref.mode }}
            mode: {{ $ref.mode | quote }}
        {{- end }}
      {{- end }}
    {{- end }}

    partitionCommon:
      conf:
    {{- if $coreConf.envFromSecret }}
        envFromSecret:
      {{- range $name, $ref := $coreConf.envFromSecret }}
          {{ $name }}:
            secret: {{ $ref.secret | quote }}
            field: {{ $ref.field | quote }}
      {{- end }}
    {{- end }}
    {{- if $coreConf.mountSecret }}
        mountSecret:
      {{- range $name, $ref := $coreConf.mountSecret }}
          {{ $name }}:
            secret: {{ $ref.secret | quote }}
            path: {{ $ref.path | quote }}
        {{- if $ref.mode }}
            mode: {{ $ref.mode | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
