{{ if (include "armonik.dependencies" $ | fromYaml).grafana }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-armonik
  labels:
    grafana_dashboard: "1"
    grafana_dashboard_folder: "Armonik"
data:
  dashboard-armonik.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-armonik.json" | indent 4 }}
  dashboard-compute.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-compute.json" | indent 4 }}
  dashboard-diskio.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-diskio.json" | indent 4 }}
  dashboard-taskhandler.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-taskhandler.json" | indent 4 }}
  dashboard-rabbitmq.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-rabbitmq.json" | indent 4 }}
  dashboard-mongodb.json: |-
{{ .Files.Get "static-confs/grafana-dashboards/dashboard-mongodb.json" | indent 4 }}
{{ end }}
